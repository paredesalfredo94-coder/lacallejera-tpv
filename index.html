<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Callejera TPV PRO MAX</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header class="topbar">
    <div class="logo-zone">
<img src="logo.png" class="logo">
        <div>
            <h1>LA CALLEJERA</h1>
            <p>TPV PRO MAX</p>
        </div>
    </div>

    <div class="cash-box">
        Caja del día:
        <span id="cajaDia">0.00€</span>
    </div>
</header>

<main class="container">

<section class="productos">
<h2>🍔 Productos</h2>

<div class="grid" id="productosGrid"></div>

<div class="acciones">
<button onclick="cobrar('Efectivo')">💵 Efectivo</button>
<button onclick="cobrar('Tarjeta')">💳 Tarjeta</button>
<button onclick="cobrar('Bizum')">📱 Bizum</button>
<button class="danger" onclick="vaciarVenta()">🗑️ Borrar</button>
</div>

<div class="extra">
<button onclick="descargarCSV()">📁 Descargar ventas</button>
<button onclick="adminLogin()">🔒 Admin</button>
</div>

</section>

<section class="ticket">
<h2>🛒 Venta actual</h2>

<div id="listaVenta"></div>

<h3>Total:</h3>
<div class="total" id="total">0.00€</div>

<hr>

<h3>Historial</h3>
<div id="historial"></div>

</section>

</main>

<script src="app.js"></script>

</body>
</html>
