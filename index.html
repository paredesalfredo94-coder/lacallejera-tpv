<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>La Callejera TPV</title>
<style>
body{font-family:Arial;margin:0;background:#111;color:#fff}
header{background:#e63946;padding:15px;text-align:center;font-size:26px;font-weight:bold}
.container{padding:15px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
button{
width:100%;padding:18px;border:none;border-radius:12px;
font-size:16px;font-weight:bold;cursor:pointer
}
.product{background:#222;color:#fff}
.pay{background:#2a9d8f;color:#fff}
.clear{background:#666;color:#fff}
.total{
margin:20px 0;padding:18px;background:#000;
border:2px solid #e63946;border-radius:12px;
font-size:28px;text-align:center;font-weight:bold
}
.list{
background:#1b1b1b;padding:12px;border-radius:12px;
min-height:120px
}
.small{font-size:14px;color:#ccc}
</style>
</head>
<body>

<header>🍔 La Callejera TPV</header>

<div class="container">

<div class="grid">
<button class="product" onclick="add('La clásica',8.5)">La clásica €8.50</button>
<button class="product" onclick="add('Clásica doble',10)">Clásica doble €10</button>
<button class="product" onclick="add('Puro lomito',12)">Puro lomito €12</button>
<button class="product" onclick="add('Desmechadita',12)">Desmechadita €12</button>
<button class="product" onclick="add('Mixta',14)">Mixta €14</button>
<button class="product" onclick="add('Coca-Cola',2)">Coca-Cola €2</button>
</div>

<div class="total" id="total">€0.00</div>

<div class="grid">
<button class="pay" onclick="pay('Efectivo')">💵 Efectivo</button>
<button class="pay" onclick="pay('Tarjeta')">💳 Tarjeta</button>
<button class="pay" onclick="pay('Bizum')">📱 Bizum</button>
<button class="clear" onclick="resetSale()">🗑️ Borrar</button>
</div>

<h3>Venta actual</h3>
<div class="list" id="items"></div>

<h3>Historial del día</h3>
<div class="list" id="history"></div>

<h3>Caja del día</h3>
<div class="total" id="cash">€0.00</div>

</div>

<script>
let total=0;
let items=[];
let cash=0;

function add(name,price){
items.push(name+" €"+price.toFixed(2));
total+=price;
render();
}

function render(){
document.getElementById("items").innerHTML=items.join("<br>");
document.getElementById("total").innerHTML="€"+total.toFixed(2);
document.getElementById("cash").innerHTML="€"+cash.toFixed(2);
}

function pay(method){
if(total===0)return;
let line=method+" - €"+total.toFixed(2);
document.getElementById("history").innerHTML=line+"<br>"+document.getElementById("history").innerHTML;
cash+=total;
resetSale(false);
render();
}

function resetSale(renderNow=true){
total=0;
items=[];
document.getElementById("items").innerHTML="";
document.getElementById("total").innerHTML="€0.00";
if(renderNow)render();
}
</script>

</body>
</html>
