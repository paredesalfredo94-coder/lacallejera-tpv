<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La Callejera TPV PRO MAX</title>
<link rel="stylesheet" href="style.css?v=2">
<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
</head>

<div id="extrasModal" class="extras-modal">

<div class="extras-box">

<h2>➕ Selecciona extras</h2>

<div class="extras-grid">

<button class="extra-btn" onclick="toggleExtra(this,'Extra queso cheddar',0.50)">
🧀 Queso +0.50€
</button>

<button class="extra-btn" onclick="toggleExtra(this,'Extra bacon',0.50)">
🥓 Bacon +0.50€
</button>

<button class="extra-btn" onclick="toggleExtra(this,'Extra pepinillos',0.50)">
🥒 Pepinillos +0.50€
</button>

<button class="extra-btn" onclick="toggleExtra(this,'Extra huevo',0.50)">
🍳 Huevo +0.50€
</button>

</div>

<div class="extras-actions">

<button class="cancelar-btn" onclick="cerrarExtras()">
Cancelar
</button>

<button class="agregar-btn" onclick="confirmarExtras()">
Agregar extras
</button>

</div>

</div>

</div>
    
<body>

<header class="topbar">
    <div class="logo-zone">
<img src="logo.png.jpeg" class="logo">
        <div>
            <h1>LA CALLEJERA</h1>
            <p>TPV PRO MAX</p>
        </div>
    </div>

    <div class="cash-box">
        Caja del día:
        <span id="cajaDia">0.00€</span>
    </div>
</header>

<main class="container">

<section class="productos">
<h2>🍔 Productos</h2>

<div class="grid" id="productosGrid"></div>

<div class="acciones">
<button onclick="cobrar('Efectivo')">💵 Efectivo</button>
<button onclick="cobrar('Tarjeta')">💳 Tarjeta</button>
<button onclick="cobrar('Bizum')">📱 Bizum</button>
<button class="danger" onclick="vaciarVenta()">🗑️ Borrar</button>
<button onclick="ponerFondoCaja()">💰 Fondo Caja</button>
</div>

<div class="extra">
<button onclick="imprimirTicket()">🖨 Ticket</button>
<button onclick="descargarExcel()">📁 Descargar ventas</button>
<button onclick="adminLogin()">🔒 Admin</button>
<button class="danger" onclick="cerrarCaja()">📊 Cerrar Caja</button>
</div>

</section>

<section class="ticket">
<h2>🛒 Venta actual</h2>

<div id="listaVenta"></div>

<h3>Total:</h3>
<div class="total" id="total">0.00€</div>

<hr>

<h3>Historial</h3>
<div id="historial"></div>

</section>

</main>

<script src="app.js"></script>

</body>
</html>
