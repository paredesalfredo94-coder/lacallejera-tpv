<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>La Callejera TPV PRO</title>
<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:Arial,Helvetica,sans-serif;
background:#0e0e0e;
color:#fff;
}
header{
background:#c1121f;
padding:18px;
text-align:center;
font-size:30px;
font-weight:700;
letter-spacing:1px;
}
.wrap{
max-width:1200px;
margin:auto;
padding:15px;
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
}
.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}
.btn{
border:none;
border-radius:14px;
padding:18px;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.2s;
}
.btn:hover{transform:scale(1.02)}
.product{background:#1f1f1f;color:#fff;border:1px solid #c1121f}
.pay{background:#c1121f;color:#fff}
.secondary{background:#333;color:#fff}
.panel{
background:#161616;
border-radius:14px;
padding:15px;
border:1px solid #2b2b2b;
}
h2,h3{margin:0 0 10px}
.total{
font-size:34px;
font-weight:800;
color:#ff4d4d;
text-align:center;
padding:10px 0;
}
.list{
min-height:140px;
line-height:1.8;
color:#ddd;
font-size:16px;
}
.small{font-size:14px;color:#aaa}
.stats{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
margin-top:10px;
}
.stat{
background:#222;
padding:12px;
border-radius:10px;
text-align:center;
}
@media(max-width:900px){
.wrap{grid-template-columns:1fr}
}
</style>
</head>
<body>

<header>🍔 LA CALLEJERA TPV PRO</header>

<div class="wrap">

<div class="panel">
<h2>Productos</h2>

<div class="grid">
<button class="btn product" onclick="add('Clásica',8.5)">Clásica<br>8,50€</button>
<button class="btn product" onclick="add('Clásica doble',10)">Clásica doble<br>10€</button>
<button class="btn product" onclick="add('Puro lomito',12)">Puro lomito<br>12€</button>
<button class="btn product" onclick="add('Desmechadita',12)">Desmechadita<br>12€</button>
<button class="btn product" onclick="add('Mixta',14)">Mixta<br>14€</button>
<button class="btn product" onclick="add('Coca-Cola Original',2)">Coca-Cola Original<br>2€</button>
<button class="btn product" onclick="add('Coca-Cola Zero',2)">Coca-Cola Zero<br>2€</button>
</div>

<h3 style="margin-top:18px">Cobrar</h3>
<div class="grid">
<button class="btn pay" onclick="pay('Efectivo')">💵 Efectivo</button>
<button class="btn pay" onclick="pay('Tarjeta')">💳 Tarjeta</button>
<button class="btn pay" onclick="pay('Bizum')">📱 Bizum</button>
<button class="btn secondary" onclick="clearSale()">🗑️ Borrar</button>
</div>
</div>

<div class="panel">
<h2>Venta actual</h2>
<div id="sale" class="list small">Sin productos</div>

<div class="total" id="total">0.00€</div>

<h3>Historial</h3>
<div id="history" class="list small">Sin ventas aún</div>

<div class="stats">
<div class="stat">
<div class="small">Caja del día</div>
<div id="cash">0.00€</div>
</div>

<div class="stat">
<div class="small">Ventas</div>
<div id="count">0</div>
</div>
</div>

</div>

</div>

<script>
let items=[];
let total=0;
let cash=0;
let count=0;

function add(name,price){
items.push({name,price});
total+=price;
render();
}

function render(){
if(items.length===0){
document.getElementById("sale").innerHTML="Sin productos";
}else{
document.getElementById("sale").innerHTML=
items.map(i=>"• "+i.name+" - "+i.price.toFixed(2)+"€").join("<br>");
}

document.getElementById("total").innerHTML=total.toFixed(2)+"€";
document.getElementById("cash").innerHTML=cash.toFixed(2)+"€";
document.getElementById("count").innerHTML=count;
}

function clearSale(){
items=[];
total=0;
render();
}

function pay(method){
if(total<=0)return;

let text = new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})+
" - "+method+" - "+total.toFixed(2)+"€";

let h=document.getElementById("history");

if(h.innerHTML==="Sin ventas aún"){h.innerHTML=""}

h.innerHTML=text+"<br>"+h.innerHTML;

cash+=total;
count++;
clearSale();
render();
}

render();
</script>

</body>
</html>
